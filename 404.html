<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Página não encontrada | Elloverde Paisagismo & Flora</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Jost', sans-serif;
    background: #2C3828;
    color: #E8E0D0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 2rem;
    overflow: hidden;
  }

  /* Fundo pontilhado */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, rgba(245,240,232,0.04) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    color: #A8C5A0;
    letter-spacing: 0.05em;
    margin-bottom: 4rem;
    text-decoration: none;
  }

  .number {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(100px, 20vw, 180px);
    font-weight: 300;
    line-height: 1;
    color: rgba(168,197,160,0.15);
    letter-spacing: -0.02em;
    position: relative;
  }

  .number::after {
    content: '404';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(100px, 20vw, 180px);
    color: rgba(168,197,160,0.08);
    transform: translateY(6px);
  }

  .leaf {
    font-size: 2.5rem;
    margin: 1.5rem 0;
    opacity: 0.6;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 300;
    font-style: italic;
    color: #E8E0D0;
    margin-bottom: 1rem;
    line-height: 1.3;
  }

  p {
    font-size: 13px;
    color: rgba(212,202,184,0.55);
    font-weight: 300;
    line-height: 1.8;
    max-width: 380px;
    margin: 0 auto 2.5rem;
  }

  .btn {
    display: inline-block;
    background: #2C5F2E;
    color: #F5F0E8;
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-weight: 400;
    padding: 13px 36px;
    text-decoration: none;
    transition: background 0.3s;
  }
  .btn:hover { background: #1F4820; }

  .divider {
    width: 40px;
    height: 0.5px;
    background: rgba(168,197,160,0.3);
    margin: 3rem auto 2rem;
  }

  .sig {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-style: italic;
    color: rgba(212,202,184,0.3);
  }
</style>
</head>
<body>
  <a href="/" class="logo">Elloverde</a>

  <div class="number">404</div>

  <div class="leaf">🌿</div>

  <h1>Esta página não pertence<br>ao nosso jardim.</h1>

  <p>O caminho que você buscou não foi encontrado. Mas há muito para explorar — volte ao início e descubra nossos serviços.</p>

  <a href="/" class="btn">Voltar ao início</a>

  <div class="divider"></div>
  <p class="sig">Elegância natural, com raízes no território.</p>
</body>
</html>
